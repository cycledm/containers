services:
  app:
    image: docker.io/dnomd343/syncplay:latest
    restart: always
    environment:
      TZ: ${TZ:-Etc/UTC}
      PASSWORD: ${PASSWORD}
      DISABLE_READY: TRUE
      CERT_DIR: /certs/${CERT_NAME}
      MOTD: |
        欢迎使用Syncplay！
        此服务由Southcraft提供，服务器所有者为CycleDM。
    command:
      - --persistent
      - --enable-tls
      - --enable-stats
    ports:
      - 8999:8999
    volumes:
      - ./data:/data
      - ${CERT_DIR:-./certs}:/certs:ro
    # user: 1000:1000
    networks:
      - network
networks:
  network:
    enable_ipv6: true
