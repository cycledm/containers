# https://hub.docker.com/r/xream/sub-store
services:
  app:
    image: xream/sub-store:latest
    restart: always
    container_name: sub-store
    ports:
      - ${HOST:-127.0.0.1}:${PORT:-3001}:${PORT:-3001}
    environment:
      TZ: ${TZ:-Etc/UTC}
      SUB_STORE_BACKEND_API_HOST: 0.0.0.0
      SUB_STORE_BACKEND_API_PORT: ${PORT:-3001}
      SUB_STORE_BACKEND_MERGE: true
      SUB_STORE_FRONTEND_BACKEND_PATH: ${FRONTEND_BACKEND_PATH:-/api}
    volumes:
      - ./data:/opt/app/data
    networks:
      - network
networks:
  network:
    enable_ipv6: false
