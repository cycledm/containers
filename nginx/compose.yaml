services:
  app:
    image: docker.io/library/nginx:latest
    restart: always
    network_mode: host
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${NGINX_CONF_DIR:-/etc/nginx}/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CONF_DIR:-/etc/nginx}/conf.d:/etc/nginx/conf.d:ro
      - ${NGINX_CONF_DIR:-/etc/nginx}/stream.d:/etc/nginx/stream.d:ro
      - ${CERT_DIR:-/etc/nginx/certs}:/etc/nginx/certs:ro
